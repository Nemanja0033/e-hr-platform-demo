<div class="relative flex justify-center">
  <div (click)="toggleNotificationModal()" 
       class="relative cursor-pointer transition-transform hover:scale-110 active:scale-95">
    <ng-container *ngIf="notifications$ | async as notifications">
      <div *ngIf="notifications.length > 0" class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white ring-2 ring-white">
        {{ notifications.length }}
      </div>
    </ng-container>
    <svg fill="none" width="28" height="28" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 hover:text-primary transition-colors">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
  </div>

  <ng-container *ngIf="isNotificationModalOpen">
    <div class="absolute right-0 top-12 z-50 flex h-auto max-h-96 w-72 flex-col gap-3 overflow-hidden rounded-md border border-gray-200 bg-surface p-0 shadow-card animate-in fade-in slide-in-from-top-2 duration-200">
      <div class="border-b border-gray-100 bg-gray-50/50 p-3">
        <h3 class="text-sm font-semibold text-gray-900">Notifications</h3>
      </div>
      
      <div class="flex flex-col gap-1 overflow-auto p-2">
        <ng-container *ngIf="(notifications$ | async) as notifications; else noNotifications">
          <ng-container *ngIf="notifications.length > 0; else noNotifications">
            <ng-container *ngFor="let notification of notifications">
              <div class="group flex cursor-pointer flex-col gap-1.5 rounded-sm border border-gray-50 p-3 transition-all hover:bg-gray-50 hover:shadow-sm">
                <div class="flex items-center justify-between">
                  <span [class]="'rounded-full px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider ' + 
                                (notification.type.includes('sick') ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600')">
                    {{ notification.type || 'System' }}
                  </span>
                  <span class="text-[10px] text-text-muted">{{ notification.body.timestamp | date:'shortTime' }}</span>
                </div>
                <p class="text-sm font-medium text-gray-800 leading-tight">{{ notification.body.subject }}</p>
              </div>
            </ng-container>
          </ng-container>
        </ng-container>
        <ng-template #noNotifications>
          <div class="flex flex-col items-center justify-center py-10 opacity-60">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-2 text-gray-300">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <p class="text-xs font-medium text-gray-400">No new notifications</p>
          </div>
        </ng-template>
      </div>
    </div>
  </ng-container>
</div>
