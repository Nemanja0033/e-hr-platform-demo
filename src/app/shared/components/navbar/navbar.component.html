<nav class="w-full bg-white shadow-md flex items-center justify-between py-3 mb-10 px-10">
  <h1
    class="text-lg font-extrabold bg-gradient-to-r from-blue-600 to-indigo-300 text-transparent bg-clip-text inline-block">
    HrPlatform✓
  </h1>
  <ng-container *ngIf="isAuth$ | async; else notAuth">
  <div class="flex items-center gap-4">
    <app-notifications (notificationsModalOpened)="forceCloseAvatarModal($event)" [avatarModalOpened]="(isAvatarModalOpen$ | async) ?? false" />
    <div class="relative">
      <div (click)="toggleAvatarModal()" class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-full bg-gray-100 font-semibold text-primary transition-all hover:bg-gray-200">
        {{ userAvatarPrefix$ | async }}  
      </div>
        <div *ngIf="isAvatarModalOpen$ | async" animate.enter="enter-animation" class="absolute right-0 top-12 z-50 grid min-h-32 max-h-96 w-48 grid-cols-1 gap-3 overflow-auto rounded-md border border-gray-200 bg-surface p-3 shadow-card animate-in fade-in slide-in-from-top-2 duration-200">
          <h1 class="text-sm font-semibold text-gray-900 border-b border-gray-100 pb-2">User Settings</h1>
          <button class="flex w-full items-center gap-3 rounded-xs p-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors" (click)="handleLogout()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
          </button>
        </div>
    </div>
  </div>
  </ng-container>
  <ng-template #notAuth>
  <div class="flex items-center gap-6">
    <a routerLink="/hr/auth" class="text-sm font-medium text-gray-600 hover:text-primary transition-colors cursor-pointer">Login as HR</a>
    <a routerLink="/employee/auth" class="text-sm font-medium text-gray-600 hover:text-primary transition-colors cursor-pointer">Login as Employee</a>
  </div>
  </ng-template>
</nav>
