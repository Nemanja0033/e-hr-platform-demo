<main class="w-full flex justify-center p-6 md:p-10">
    <div class="w-full max-w-7xl flex flex-col gap-8">
        <div class="flex items-center justify-between border-b border-gray-100 pb-6">
            <h1 class="text-3xl font-bold text-gray-900">Sick Leave Request</h1>
            <button (click)="toggleRequestMode()" 
                    class="flex items-center justify-center rounded-xs bg-primary px-5 py-2.5 text-surface font-medium shadow-sm transition-all duration-300 hover:bg-primary-dark">
                {{ isRequestMode ? 'View My Requests' : 'Submit New Request' }}
            </button>
        </div>

        <ng-container *ngIf="isRequestMode; else listMode">
            <div class="flex flex-col items-center gap-8 py-10">
                <div class="flex flex-col items-center gap-2 rounded-lg bg-red-50 px-8 py-4 text-center" *ngIf="employeeData$ | async as employeeData">
                    <span class="text-3xl font-bold text-red-600">{{ employeeData?.sickLeaveDays }}</span>
                    <span class="text-sm font-medium text-red-500 uppercase tracking-wide">Sick Leave Days Left</span>
                </div>

                <form class="w-full max-w-md flex flex-col gap-6" [formGroup]="sickLeaveRequestForm" (ngSubmit)="onRequestFormSubmit()">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <app-datepicker
                            label="Start Date"
                            formControlName="startDate"
                            [error]="sickLeaveRequestForm.get('startDate')?.touched && sickLeaveRequestForm.get('startDate')?.invalid ? 'Required' : null"
                        />
                        
                        <app-datepicker
                            label="End Date"
                            formControlName="endDate"
                            [error]="sickLeaveRequestForm.get('endDate')?.touched && sickLeaveRequestForm.get('endDate')?.invalid ? 'Required' : null"
                        />
                    </div>

                    <app-input
                        label="Reason"
                        type="textarea"
                        placeholder="Explain your reason..."
                        formControlName="reason"
                        [rows]="4"
                        [error]="sickLeaveRequestForm.get('reason')?.touched && sickLeaveRequestForm.get('reason')?.invalid ? 'Reason (min 10 characters) is required' : null"
                    />

                    <button type="submit" 
                            class="flex items-center justify-center rounded-xs bg-primary px-6 py-3 text-surface font-medium shadow-sm transition-all duration-300 hover:bg-primary-dark disabled:opacity-50"
                            [disabled]="sickLeaveRequestForm.invalid || (isLoading$ | async)">
                        {{ (isLoading$ | async) ? 'Submitting...' : 'Submit Request' }}
                    </button>
                </form>
            </div>
        </ng-container>

        <ng-template #listMode>
            <ng-container *ngIf="isLoading$ | async; else requestsList">
                <div class="flex justify-center py-20">
                    <app-spinner size="md" />
                </div>
            </ng-container>

            <ng-template #requestsList>
                <ng-container *ngIf="(requests$ | async) as requests; else noRequests">
                    <ng-container *ngIf="requests.length > 0; else noRequests">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            <div *ngFor="let req of requests" class="group flex flex-col gap-4 rounded-md border-2 border-gray-100 bg-surface p-5 shadow-card transition-all duration-300 hover:shadow-lg">
                                <div class="flex items-center justify-between border-b border-gray-50 pb-3">
                                    <span class="rounded-full bg-blue-50 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-blue-600">
                                        {{ req.status || 'PENDING' }}
                                    </span>
                                    <span class="text-[10px] text-text-muted">{{ req.startDate | date:'MMM d, y' }}</span>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <div class="flex items-center gap-2 text-sm text-gray-600">
                                        <span class="font-medium">Period:</span>
                                        <span>{{ req.startDate | date:'dd/MM' }} - {{ req.endDate | date:'dd/MM/yyyy' }}</span>
                                    </div>
                                    <p class="text-sm text-gray-700 line-clamp-3 leading-relaxed italic">"{{ req.reason }}"</p>
                                </div>
                            </div>
                        </div>
                    </ng-container>
                </ng-container>
                
                <ng-template #noRequests>
                    <div class="flex flex-col items-center justify-center py-20 opacity-60">
                        <p class="text-lg font-medium text-gray-400">No submitted sick leave requests</p>
                    </div>
                </ng-template>
            </ng-template>
        </ng-template>
    </div>
</main>
