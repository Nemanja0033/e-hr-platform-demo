<main class="w-full flex justify-center p-6 md:p-10">
    <div class="w-full max-w-7xl flex flex-col gap-8">
        <div class="flex items-center justify-between border-b border-gray-100 pb-6">
            <h1 class="text-3xl font-bold text-gray-900">Employees</h1>
            <button [disabled]="isRegisterEmployeeMode" 
                    (click)="toggleRegisterMode()" 
                    class="flex items-center justify-center rounded-xs bg-employee px-5 py-2.5 text-surface font-medium shadow-sm transition-all duration-300 hover:opacity-90 disabled:opacity-50">
                + Add Employee
            </button>
        </div>

        <ng-container *ngIf="isRegisterEmployeeMode; else listsMode">
            <div class="flex flex-col gap-8 bg-surface p-8 rounded-md border-2 border-gray-100 shadow-card max-w-2xl mx-auto w-full">
                <div class="flex flex-col gap-1">
                    <h2 class="text-xl font-semibold text-gray-900">Add New Employee</h2>
                    <p class="text-sm text-text-muted">Fill in the details to register a new team member.</p>
                </div>

                <form class="grid grid-cols-1 md:grid-cols-2 gap-6" [formGroup]="registerEmployeeForm" (ngSubmit)="onRegisterEmployeeSubmit()">
                    <app-input
                        label="First Name"
                        placeholder="John"
                        formControlName="name"
                        [error]="registerEmployeeForm.get('name')?.touched && registerEmployeeForm.get('name')?.invalid ? 'First name is required' : null"
                    />

                    <app-input
                        label="Last Name"
                        placeholder="Doe"
                        formControlName="surname"
                        [error]="registerEmployeeForm.get('surname')?.touched && registerEmployeeForm.get('surname')?.invalid ? 'Last name is required' : null"
                    />

                    <app-input
                        label="Email Address"
                        type="email"
                        placeholder="john.doe@company.com"
                        formControlName="email"
                        class="md:col-span-2"
                        [error]="registerEmployeeForm.get('email')?.touched && registerEmployeeForm.get('email')?.invalid ? 'Valid email is required' : null"
                    />

                    <app-input
                        label="Temporary Password"
                        type="password"
                        formControlName="password"
                        [error]="registerEmployeeForm.get('password')?.touched && registerEmployeeForm.get('password')?.invalid ? 'Password (5-9 chars) is required' : null"
                    />

                    <app-input
                        label="Role"
                        placeholder="e.g. Developer"
                        formControlName="role"
                        [error]="registerEmployeeForm.get('role')?.touched && registerEmployeeForm.get('role')?.invalid ? 'Role is required' : null"
                    />

                    <div class="md:col-span-2 flex justify-end gap-4 pt-4">
                        <button type="button" (click)="cancelRegistration()" class="px-6 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Cancel</button>
                        <button class="flex items-center justify-center rounded-xs bg-employee px-8 py-2.5 text-surface font-medium shadow-sm transition-all duration-300 hover:opacity-90 disabled:opacity-50" 
                                type="submit"
                                [disabled]="registerEmployeeForm.invalid">
                            Create Employee
                        </button>
                    </div>
                </form>
            </div>
        </ng-container>

        <ng-template #listsMode>
            <ng-container *ngIf="loading$ | async; else mainContent">
                <div class="flex justify-center py-20">
                    <app-spinner size="md" />
                </div>
            </ng-container>

            <ng-template #mainContent>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <ng-container *ngFor="let employe of (employees$ | async)">
                        <div class="group flex flex-col gap-6 rounded-md border-2 border-gray-100 bg-surface p-6 shadow-card transition-all duration-300 hover:shadow-lg">
                            <div class="flex items-start justify-between">
                                <div class="flex flex-col gap-1">
                                    <h3 class="text-xl font-bold text-gray-900">{{ employe.name }} {{ employe.surname }}</h3>
                                    <span class="text-sm text-text-muted">{{ employe.email }}</span>
                                </div>
                                <span class="rounded-full bg-employee-soft px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-employee">
                                    {{ employe.role }}
                                </span>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1 rounded-md bg-gray-50 p-3">
                                    <span class="text-[10px] font-bold uppercase tracking-wider text-text-muted">Vacation</span>
                                    <span class="text-lg font-bold text-gray-900">{{ employe.vacationDays }}<span class="text-xs font-normal text-gray-400 ml-1">days</span></span>
                                </div>
                                <div class="flex flex-col gap-1 rounded-md bg-gray-50 p-3">
                                    <span class="text-[10px] font-bold uppercase tracking-wider text-text-muted">Sick Leave</span>
                                    <span class="text-lg font-bold text-gray-900">{{ employe.sickLeave }}<span class="text-xs font-normal text-gray-400 ml-1">days</span></span>
                                </div>
                            </div>

                            <button class="mt-auto flex items-center justify-center rounded-xs bg-employee px-4 py-2.5 text-surface font-medium shadow-sm transition-all duration-300 hover:opacity-90">
                                View Profile
                            </button>
                        </div>
                    </ng-container>
                    <div *ngIf="!(employees$ | async)?.length" class="col-span-full py-20 text-center opacity-60">
                        <p class="text-gray-400">No employees found.</p>
                    </div>
                </div>
            </ng-template>
        </ng-template>
    </div>
</main>
